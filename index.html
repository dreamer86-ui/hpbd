<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Cumpleaños</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  @keyframes sway { 0%,100%{transform:rotate(-2deg)} 50%{transform:rotate(2deg)} }
  @keyframes petal-fall { 0%{opacity:0;transform:translateY(-10px) rotate(0deg)} 100%{opacity:.7;transform:translateY(120vh) rotate(720deg)} }
  @keyframes float-in { 0%{opacity:0;transform:translateY(30px) scale(.9)} 100%{opacity:1;transform:translateY(0) scale(1)} }
  @keyframes sparkle { 0%,100%{opacity:0;transform:scale(0)} 50%{opacity:1;transform:scale(1)} }
  @keyframes ribbon-wave { 0%,100%{transform:skewX(-3deg)} 50%{transform:skewX(3deg)} }
  @keyframes glow-pulse { 0%,100%{filter:drop-shadow(0 0 8px rgba(255,255,255,.4))} 50%{filter:drop-shadow(0 0 20px rgba(255,255,255,.8))} }

  body { margin:0; overflow-x:hidden; font-family: sans-serif; }

  .scene {
    min-height: 100vh;
    background: linear-gradient(160deg, #1a0a2e 0%, #2d1b4e 40%, #1a0a2e 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem 3rem;
    position: relative;
    overflow: hidden;
  }

  .petal {
    position: fixed;
    width: 10px;
    height: 14px;
    border-radius: 50% 50% 50% 10%;
    background: rgba(255,255,255,.6);
    animation: petal-fall linear infinite;
    pointer-events: none;
  }

  .bouquet-wrap {
    animation: float-in .8s ease forwards;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
  }

  .sparkle {
    position: absolute;
    width: 6px; height: 6px;
    background: #fff;
    border-radius: 50%;
    animation: sparkle 2s ease-in-out infinite;
  }

  .message-card {
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.2);
    border-radius: 16px;
    padding: 1.2rem 1.8rem;
    text-align: center;
    color: #fff;
    margin-top: 1.5rem;
    max-width: 320px;
    animation: float-in .8s .4s ease both;
  }

  .message-card h2 {
    margin: 0 0 .4rem;
    font-size: 1.2rem;
    font-weight: 500;
    color: #f0e8ff;
  }

  .message-card p {
    margin: 0;
    font-size: .9rem;
    line-height: 1.6;
    color: rgba(255,255,255,.75);
  }

  .ribbon { animation: ribbon-wave 3s ease-in-out infinite; transform-origin: center top; }
  .rose-group { animation: sway 4s ease-in-out infinite; transform-origin: center bottom; }
</style>
</head>
<body>
<div class="scene" id="scene">
  <div class="bouquet-wrap">
    <div class="sparkle" style="top:-10px;left:60px;animation-delay:.3s"></div>
    <div class="sparkle" style="top:20px;right:50px;animation-delay:1.1s"></div>
    <div class="sparkle" style="top:60px;left:30px;animation-delay:1.8s"></div>
    <div class="sparkle" style="top:-20px;right:80px;animation-delay:.7s"></div>
    <div class="sparkle" style="top:40px;left:10px;animation-delay:2.3s;width:4px;height:4px"></div>

    <svg width="280" height="340" viewBox="0 0 280 340" style="animation:glow-pulse 3s ease-in-out infinite;overflow:visible">
      <defs>
        <radialGradient id="petalG" cx="50%" cy="40%" r="55%">
          <stop offset="0%" stop-color="#ffffff"/>
          <stop offset="60%" stop-color="#f0eef8"/>
          <stop offset="100%" stop-color="#d8d0ef"/>
        </radialGradient>
        <radialGradient id="centerG" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#fff9e6"/>
          <stop offset="100%" stop-color="#f5e8c0"/>
        </radialGradient>
        <radialGradient id="leafG" cx="40%" cy="30%" r="60%">
          <stop offset="0%" stop-color="#7ec87e"/>
          <stop offset="100%" stop-color="#3a7a3a"/>
        </radialGradient>
      </defs>

      <!-- stems -->
      <line x1="140" y1="290" x2="100" y2="190" stroke="#4a7a4a" stroke-width="4" stroke-linecap="round"/>
      <line x1="140" y1="290" x2="140" y2="170" stroke="#5a8a5a" stroke-width="4.5" stroke-linecap="round"/>
      <line x1="140" y1="290" x2="180" y2="185" stroke="#4a7a4a" stroke-width="4" stroke-linecap="round"/>

      <!-- leaves -->
      <ellipse cx="115" cy="230" rx="18" ry="9" fill="url(#leafG)" transform="rotate(-40 115 230)" opacity=".9"/>
      <ellipse cx="163" cy="235" rx="17" ry="8" fill="url(#leafG)" transform="rotate(35 163 235)" opacity=".9"/>
      <ellipse cx="140" cy="220" rx="16" ry="7" fill="url(#leafG)" transform="rotate(-5 140 220)" opacity=".85"/>

      <!-- ROSE LEFT -->
      <g class="rose-group" style="animation-delay:.5s">
        <g transform="translate(100,155)">
          <ellipse cx="0" cy="-28" rx="18" ry="28" fill="url(#petalG)" opacity=".85" transform="rotate(-15)"/>
          <ellipse cx="0" cy="-28" rx="18" ry="28" fill="url(#petalG)" opacity=".85" transform="rotate(30)"/>
          <ellipse cx="0" cy="-28" rx="18" ry="28" fill="url(#petalG)" opacity=".85" transform="rotate(75)"/>
          <ellipse cx="0" cy="-28" rx="18" ry="28" fill="url(#petalG)" opacity=".85" transform="rotate(120)"/>
          <ellipse cx="0" cy="-28" rx="18" ry="28" fill="url(#petalG)" opacity=".85" transform="rotate(165)"/>
          <ellipse cx="0" cy="-20" rx="13" ry="20" fill="url(#petalG)" transform="rotate(0)"/>
          <ellipse cx="0" cy="-20" rx="13" ry="20" fill="url(#petalG)" transform="rotate(60)"/>
          <ellipse cx="0" cy="-20" rx="13" ry="20" fill="url(#petalG)" transform="rotate(120)"/>
          <ellipse cx="0" cy="-20" rx="13" ry="20" fill="url(#petalG)" transform="rotate(180)"/>
          <ellipse cx="0" cy="-20" rx="13" ry="20" fill="url(#petalG)" transform="rotate(240)"/>
          <ellipse cx="0" cy="-12" rx="8" ry="14" fill="url(#petalG)" transform="rotate(20)"/>
          <ellipse cx="0" cy="-12" rx="8" ry="14" fill="url(#petalG)" transform="rotate(100)"/>
          <ellipse cx="0" cy="-12" rx="8" ry="14" fill="url(#petalG)" transform="rotate(180)"/>
          <circle cx="0" cy="0" r="8" fill="url(#centerG)"/>
          <circle cx="0" cy="0" r="4" fill="#fff9d0" opacity=".8"/>
        </g>
      </g>

      <!-- ROSE CENTER -->
      <g class="rose-group" style="animation-delay:0s">
        <g transform="translate(140,132)">
          <ellipse cx="0" cy="-32" rx="21" ry="32" fill="url(#petalG)" opacity=".85" transform="rotate(-10)"/>
          <ellipse cx="0" cy="-32" rx="21" ry="32" fill="url(#petalG)" opacity=".85" transform="rotate(26)"/>
          <ellipse cx="0" cy="-32" rx="21" ry="32" fill="url(#petalG)" opacity=".85" transform="rotate(62)"/>
          <ellipse cx="0" cy="-32" rx="21" ry="32" fill="url(#petalG)" opacity=".85" transform="rotate(98)"/>
          <ellipse cx="0" cy="-32" rx="21" ry="32" fill="url(#petalG)" opacity=".85" transform="rotate(134)"/>
          <ellipse cx="0" cy="-32" rx="21" ry="32" fill="url(#petalG)" opacity=".85" transform="rotate(170)"/>
          <ellipse cx="0" cy="-22" rx="15" ry="22" fill="url(#petalG)" transform="rotate(0)"/>
          <ellipse cx="0" cy="-22" rx="15" ry="22" fill="url(#petalG)" transform="rotate(60)"/>
          <ellipse cx="0" cy="-22" rx="15" ry="22" fill="url(#petalG)" transform="rotate(120)"/>
          <ellipse cx="0" cy="-22" rx="15" ry="22" fill="url(#petalG)" transform="rotate(180)"/>
          <ellipse cx="0" cy="-22" rx="15" ry="22" fill="url(#petalG)" transform="rotate(240)"/>
          <ellipse cx="0" cy="-14" rx="9" ry="16" fill="url(#petalG)" transform="rotate(30)"/>
          <ellipse cx="0" cy="-14" rx="9" ry="16" fill="url(#petalG)" transform="rotate(110)"/>
          <ellipse cx="0" cy="-14" rx="9" ry="16" fill="url(#petalG)" transform="rotate(190)"/>
          <circle cx="0" cy="0" r="9" fill="url(#centerG)"/>
          <circle cx="0" cy="0" r="5" fill="#fff9d0" opacity=".8"/>
        </g>
      </g>

      <!-- ROSE RIGHT -->
      <g class="rose-group" style="animation-delay:1s">
        <g transform="translate(182,152)">
          <ellipse cx="0" cy="-28" rx="18" ry="28" fill="url(#petalG)" opacity=".85" transform="rotate(10)"/>
          <ellipse cx="0" cy="-28" rx="18" ry="28" fill="url(#petalG)" opacity=".85" transform="rotate(46)"/>
          <ellipse cx="0" cy="-28" rx="18" ry="28" fill="url(#petalG)" opacity=".85" transform="rotate(82)"/>
          <ellipse cx="0" cy="-28" rx="18" ry="28" fill="url(#petalG)" opacity=".85" transform="rotate(118)"/>
          <ellipse cx="0" cy="-28" rx="18" ry="28" fill="url(#petalG)" opacity=".85" transform="rotate(154)"/>
          <ellipse cx="0" cy="-20" rx="13" ry="20" fill="url(#petalG)" transform="rotate(0)"/>
          <ellipse cx="0" cy="-20" rx="13" ry="20" fill="url(#petalG)" transform="rotate(72)"/>
          <ellipse cx="0" cy="-20" rx="13" ry="20" fill="url(#petalG)" transform="rotate(144)"/>
          <ellipse cx="0" cy="-20" rx="13" ry="20" fill="url(#petalG)" transform="rotate(216)"/>
          <ellipse cx="0" cy="-12" rx="8" ry="14" fill="url(#petalG)" transform="rotate(40)"/>
          <ellipse cx="0" cy="-12" rx="8" ry="14" fill="url(#petalG)" transform="rotate(160)"/>
          <circle cx="0" cy="0" r="8" fill="url(#centerG)"/>
          <circle cx="0" cy="0" r="4" fill="#fff9d0" opacity=".8"/>
        </g>
      </g>

      <!-- wrapping paper -->
      <polygon points="80,295 200,295 220,340 60,340" fill="#b39ddb" opacity=".7"/>
      <polygon points="90,295 190,295 205,340 75,340" fill="#ce93d8" opacity=".5"/>
      <line x1="80" y1="295" x2="60" y2="340" stroke="#9575cd" stroke-width="1.5" opacity=".6"/>
      <line x1="200" y1="295" x2="220" y2="340" stroke="#9575cd" stroke-width="1.5" opacity=".6"/>
      <line x1="140" y1="295" x2="140" y2="340" stroke="#b39ddb" stroke-width="1" stroke-dasharray="4,4" opacity=".4"/>

      <!-- ribbon -->
      <g class="ribbon">
        <rect x="110" y="287" width="60" height="12" rx="6" fill="#f8bbd0" opacity=".9"/>
        <ellipse cx="124" cy="285" rx="14" ry="9" fill="#f48fb1" opacity=".85" transform="rotate(-20 124 285)"/>
        <ellipse cx="156" cy="285" rx="14" ry="9" fill="#f48fb1" opacity=".85" transform="rotate(20 156 285)"/>
        <circle cx="140" cy="286" r="6" fill="#f06292"/>
        <circle cx="140" cy="286" r="3" fill="#f8bbd0"/>
      </g>
    </svg>

    <div class="message-card">
      <h2>Feliz Cumpleaños</h2>
      <p>Un ramo de rosas blancas, tan puras y especiales como tú. ¡Que este día sea tan hermoso como mereces!</p>
    </div>
  </div>
</div>

<script>
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.top = '-20px';
    p.style.animationDuration = (4 + Math.random() * 6) + 's';
    p.style.animationDelay = (Math.random() * 8) + 's';
    p.style.opacity = (.3 + Math.random() * .5);
    p.style.transform = `rotate(${Math.random()*360}deg) scale(${.5 + Math.random()})`;
    p.style.width = (6 + Math.random() * 8) + 'px';
    p.style.height = (8 + Math.random() * 10) + 'px';
    document.body.appendChild(p);
  }
</script>
</body>
</html>
